<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Landing Page</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1505842465776-3d90f6163101') no-repeat center center/cover;
    color: white;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.7);
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Heading */
h1 {
    font-size: 80px;
    margin: 0;
    text-align: center;
}

.red {
    color: red;
}

/* Paragraph */
p {
    margin-top: 20px;
    font-size: 14px;
    text-align: center;
    max-width: 600px;
    color: #ccc;
}

/* Buttons */
.buttons {
    margin-top: 25px;
}

button {
    padding: 12px 25px;
    margin: 5px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-red {
    background: red;
    color: white;
}

.btn-outline {
    background: transparent;
    border: 1px solid white;
    color: white;
}

/* Stats */
.stats {
    position: absolute;
    bottom: 30px;
    display: flex;
    gap: 50px;
    text-align: center;
}

.stats div {
    font-size: 20px;
}

.stats span {
    display: block;
    font-size: 12px;
    color: #aaa;
}
</style>

</head>

<body>

<div class="overlay">

    <h1>
        PLAY <br>
        <span class="red">HARD.</span><br>
        WIN BIG.
    </h1>

    <p>
        Apex University Sports — where raw talent meets elite training.
        Join over 800 athletes across 12 competitive sports programs.
    </p>
<a href="2.html".html>go to page</a>


    
   <div class="buttons">
        <button class="btn-red">EXPLORE SPORTS</button>
        <button class="btn-outline">VIEW SCHEDULE</button>
    </div>

</div>

<div class="stats">
    <div>24 <span>CHAMPIONSHIPS</span></div>
    <div>800+ <span>ATHLETES</span></div>
    <div>12 <span>SPORTS</span></div>
    <div>98% <span>PLACEMENT</span></div>
</div>

</body>
</html>
